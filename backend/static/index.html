<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK TELCO INTEL</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>UK Telco Intelligence</h1>
    <div class="meta">
      <span class="live-dot"></span>
      <span id="status">CONNECTING...</span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-type="">ALL</button>
    <button class="filter-btn" data-type="policy">POLICY</button>
    <button class="filter-btn" data-type="regulation">REGULATION</button>
    <button class="filter-btn" data-type="trade_press">TRADE</button>
    <button class="filter-btn" data-type="news">NEWS</button>
    <button class="filter-btn" data-type="forum">FORUM</button>
    <button class="filter-btn" data-type="incident">INCIDENT</button>
    <button class="filter-btn" data-type="curated">CURATED</button>
    <input class="search-input" type="text" id="search" placeholder="> search..." />
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="count-info">--</span>
    <span id="refresh-info">--</span>
  </div>

  <script>
    let allUpdates = [];
    let activeType = '';
    let searchTerm = '';

    // ── Helpers ────────────────────────────────────────────────────
    function relativeTime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      return days + 'd ago';
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Render ─────────────────────────────────────────────────────
    function renderFeed() {
      const feed = document.getElementById('feed');
      const lowerSearch = searchTerm.toLowerCase();

      const filtered = allUpdates.filter(u => {
        if (activeType && u.source_type !== activeType) return false;
        if (lowerSearch) {
          const haystack = (u.title + ' ' + u.summary).toLowerCase();
          if (!haystack.includes(lowerSearch)) return false;
        }
        return true;
      });

      document.getElementById('count-info').textContent =
        filtered.length + ' / ' + allUpdates.length + ' updates';

      if (filtered.length === 0) {
        feed.innerHTML = '<div style="color:var(--fg-dim);padding:2rem;">No matching updates.</div>';
        return;
      }

      let html = '';
      for (const u of filtered) {
        const badgeClass = 'badge badge-' + u.source_type;
        const titleHtml = u.link_url
          ? '<a href="' + escapeHtml(u.link_url) + '" target="_blank" rel="noopener">' + escapeHtml(u.title) + '</a>'
          : escapeHtml(u.title);
        const tags = u.tags
          ? u.tags.split(',').map(function(t){ return t.trim(); }).filter(Boolean).map(function(t){
              return '<span class="tag-pill">' + escapeHtml(t) + '</span>';
            }).join('')
          : '';

        html += '<div class="card">'
          + '<div class="card-top">'
          +   '<span class="' + badgeClass + '">' + escapeHtml(u.source_type) + '</span>'
          +   '<span class="source-name">' + escapeHtml(u.source_name) + '</span>'
          +   '<span class="timestamp">' + relativeTime(u.created_at) + '</span>'
          + '</div>'
          + '<div class="card-title">' + titleHtml + '</div>'
          + (u.summary ? '<div class="card-summary">' + escapeHtml(u.summary) + '</div>' : '')
          + (tags ? '<div class="card-tags">' + tags + '</div>' : '')
          + '</div>';
      }
      feed.innerHTML = html;
    }

    // ── Fetch ──────────────────────────────────────────────────────
    async function fetchUpdates() {
      var statusEl = document.getElementById('status');
      var refreshEl = document.getElementById('refresh-info');
      try {
        var res = await fetch('/api/updates?limit=100');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        allUpdates = data;
        renderFeed();
        var now = new Date().toLocaleTimeString();
        statusEl.textContent = 'LIVE';
        refreshEl.textContent = 'last refresh ' + now;
      } catch (err) {
        statusEl.textContent = 'ERROR: ' + err.message;
      }
    }

    // ── Filter buttons ─────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        activeType = btn.dataset.type;
        renderFeed();
      });
    });

    document.getElementById('search').addEventListener('input', function(e) {
      searchTerm = e.target.value;
      renderFeed();
    });

    // ── Boot ───────────────────────────────────────────────────────
    fetchUpdates();
    setInterval(fetchUpdates, 60000);
  </script>
</body>
</html>
